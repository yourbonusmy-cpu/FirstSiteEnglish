{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'lists/css/lists.css' %}">
{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3 mb-4">
        {% for list in word_lists %}
            {% include "lists/_list_card.html" with list=list %}
        {% empty %}
            <p class="text-muted">Списков пока нет</p>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'lists/js/lists.js' %}"></script>
{% endblock %}
