{% load static %}

<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Word Lists{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="{% static 'lists/css/icons.css' %}">
    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    {% block extra_css %}{% endblock %}

</head>
<body class="{% if user.is_authenticated %}{{ user.theme }}-theme{% else %}light-theme{% endif %}">

{% include "includes/header.html" %}
{% include "includes/auth_modal.html" %}

<div class="container mt-2">
    {% block content %}{% endblock %}
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/save_notifications.js' %}"></script>

{% block extra_js %}{% endblock %}


<script src="{% static 'js/auth.js' %}"></script>

<script>
    window.userId = {% if user.is_authenticated %}{{ user.id }}{% else %}null{% endif %};
    window.userTheme = {% if user.is_authenticated %}"{{ user.theme }}"{% else %}null{% endif %};
</script>
<script src="{% static 'js/theme.js' %}"></script>

</body>
</html>
